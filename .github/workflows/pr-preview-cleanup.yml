name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        id: cleanup
        run: |
          PREVIEW_DIR="pr-preview/pr-${{ github.event.number }}"
          if [ -d "$PREVIEW_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PREVIEW_DIR"
            git commit -m "chore: remove preview for PR #${{ github.event.number }}"
            git push
            echo "removed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No preview directory found for PR #${{ github.event.number }}, skipping cleanup."
            echo "removed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post cleanup comment
        if: steps.cleanup.outputs.removed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🗑️ Preview environment has been removed.',
            });
